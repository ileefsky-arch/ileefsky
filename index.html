    function showServiceModal(id, type) {
        let item = type === 'academy' ? contentData.academy.find(x => x.id === id) : contentData.services.find(x => x.id === id);
        if (!item) return;
        let lang = currentLanguage;
        let title = item.title[lang];
        let desc = item.fullDesc[lang];
        let features = item.features[lang];
        let price = item.price[lang];
        let note = item.priceNote[lang];
        
        let imagesHtml = '';
        if (item.images && item.images.length) {
            imagesHtml = `<div class="modal-gallery">${item.images.map(img => `<img src="${img}" alt="${title}" onclick="window.open('${img}', '_blank')">`).join('')}</div>`;
        }
        
        let videoHtml = '';
        if (item.videoUrl && item.videoUrl !== '') {
            videoHtml = `<div class="modal-video"><iframe src="${item.videoUrl}" frameborder="0" allowfullscreen></iframe></div>`;
        }
        
        document.getElementById('modalTitle').innerHTML = title;
        document.getElementById('modalBody').innerHTML = `
            <p style="color:#ccc; margin-bottom:15px;">${desc}</p>
            ${imagesHtml}
            ${videoHtml}
            <div class="modal-price">💰 ${price}<small>${note}</small></div>
            <ul class="modal-features">${features.map(f => `<li>${f}</li>`).join('')}</ul>
            <button class="modal-btn" onclick="requestService('${title}')">📞 ${lang === 'ar' ? 'اطلب الخدمة الآن' : 'Request Service Now'}</button>
        `;
        document.getElementById('serviceModal').style.display = 'flex';
    }

    window.onclick = e => { if (e.target === document.getElementById('serviceModal')) closeModal(); };

        container.innerHTML = contentData.testimonials.map(t => `
            <div class="testimonial-card">
                <div class="testimonial-avatar">${t.avatar}</div>
                <div class="testimonial-stars">${'★'.repeat(t.stars)}${'☆'.repeat(5-t.stars)}</div>
                <div class="testimonial-text">"${t.text}"</div>
                <div class="testimonial-name">${t.name}</div>
                <div class="testimonial-role">${t.role}</div>
            </div>
        `).join('');
    }
    
    function renderHome() {
        let lang = currentLanguage;
        let statsHtml = contentData.stats.map(s => `<div class="stat-counter-card"><div class="stat-icon"><i class="fas ${s.icon}"></i></div><div class="stat-number"><span class="counter" data-target="${s.value}">0</span>${s.suffix}</div><div class="stat-label">${s[lang === 'ar' ? 'labelAr' : 'labelEn']}</div></div>`).join('');
        let announcements = getAnnouncements(lang);
        let annHtml = '';
        announcements.forEach(a => {
            let click = `onclick="showServiceModal('${a.targetId}', '${a.targetType}')"`;
            if (a.type === 'image') annHtml += `<span class="announcement-item" ${click}><img class="announcement-item-img" src="${a.src}"><strong>${a.text}</strong> ${a.highlight} ${a.suffix}<span class="offer-badge">${a.badge}</span></span>`;
            else annHtml += `<span class="announcement-item" ${click}><i class="fas ${a.icon}"></i><strong>${a.text}</strong> ${a.highlight} ${a.suffix}<span class="offer-badge">${a.badge}</span></span>`;
        });
        let servicesHtml = contentData.services.map(s => `<div class="card" onclick="showServiceModal('${s.id}', 'service')"><i class="fas ${s.icon} card-icon"></i><h3>${s.title[lang]}</h3><p>${s.shortDesc[lang]}</p></div>`).join('');
        let academyHtml = contentData.academy.map(a => `<div class="card" onclick="showServiceModal('${a.id}', 'academy')"><i class="fas ${a.icon} card-icon"></i><h3>${a.title[lang]}</h3><p>${a.shortDesc[lang]}</p></div>`).join('');
        document.getElementById('homeContent').innerHTML = `<header><img id="logoImg" class="logo" src="logo.png" onerror="this.style.display='none';this.parentNode.innerHTML+='<div class=\'logo-placeholder\'>🚀</div>'"><h1>${contentData.siteName[lang]}</h1><p class="tagline">${contentData.tagline[lang]}</p><button class="btn" onclick="scrollToContact()">📧 ${lang === 'ar' ? 'اتصل بنا' : 'Contact'}</button></header><section class="section section-alt"><h2>${lang === 'ar' ? 'تأثيرنا' : 'Our Impact'}</h2><div class="stats-counter-container">${statsHtml}</div><div class="announcement-bar"><div class="announcement-track">${annHtml + annHtml}</div></div></section><section class="section"><h2>✨ ${lang === 'ar' ? 'خدماتنا' : 'Services'}</h2><div class="services">${servicesHtml}</div></section><section class="section section-alt"><h2>🎓 ${lang === 'ar' ? 'أكاديميتنا' : 'Academy'}</h2><div class="services">${academyHtml}</div></section>`;
        setTimeout(() => { document.querySelectorAll('.counter').forEach(c => { let t = +c.dataset.target, cur = 0, inc = t/50; let up = () => { if(cur < t) { cur += inc; c.innerText = Math.ceil(cur); setTimeout(up, 30); } else c.innerText = t; }; up(); }); }, 500);
        
        renderPartners();
        renderProjects();
        renderTestimonials();
    }
    
    function renderAbout() {
        let lang = currentLanguage;
        document.getElementById('aboutContent').innerHTML = `<header style="padding:100px 20px 40px"><h1>${contentData.about.title[lang]}</h1><p>${contentData.about.subtitle[lang]}</p></header><section class="section"><div class="about-container"><div class="about-card"><i class="fas ${contentData.about.mission.icon} card-icon"></i><h3>${contentData.about.mission.title[lang]}</h3><p>${contentData.about.mission.text[lang]}</p></div><div class="about-card"><i class="fas ${contentData.about.vision.icon} card-icon"></i><h3>${contentData.about.vision.title[lang]}</h3><p>${contentData.about.vision.text[lang]}</p></div><div class="about-card"><i class="fas ${contentData.about.values.icon} card-icon"></i><h3>${contentData.about.values.title[lang]}</h3><p>${contentData.about.values.text[lang]}</p></div></div></section><section class="section section-alt"><h2>${lang === 'ar' ? 'فريقنا' : 'Team'}</h2><div class="team-container">${contentData.team.map(t => `<div class="team-card"><div class="team-avatar"><i class="fas ${t.icon}"></i></div><h3 class="team-name">${t[lang === 'ar' ? 'nameAr' : 'nameEn']}</h3><p class="team-role">${t[lang === 'ar' ? 'roleAr' : 'roleEn']}</p></div>`).join('')}</div></section>`;
    }
    
    function renderContact() {
        let lang = currentLanguage;
        document.getElementById('contactContent').innerHTML = `<h2>📬 ${contentData.contact.title[lang]}</h2><div class="social-links">${contentData.social.map(s => `<a href="${s.url}" target="_blank" class="social-icon"><i class="fab ${s.icon}"></i></a>`).join('')}</div><div class="map-container"><div class="map-wrapper"><iframe src="https://www.openstreetmap.org/export/embed.html?bbox=2.95,36.70,3.15,36.80&layer=mapnik&marker=36.7538,3.0588" width="100%" height="400" style="border:0; border-radius:15px;" allowfullscreen loading="lazy"></iframe></div><div class="info-card"><h3>${lang === 'ar' ? 'موقعنا' : 'Location'}</h3><div class="info-item"><div class="info-icon"><i class="fas fa-map-marker-alt"></i></div><div class="info-text"><strong>${lang === 'ar' ? 'العنوان' : 'Address'}</strong><span>${contentData.contact.address[lang]}</span></div></div><div class="info-item"><div class="info-icon"><i class="fas fa-phone"></i></div><div class="info-text"><strong>${lang === 'ar' ? 'الهاتف' : 'Phone'}</strong><span>${contentData.contact.phone}</span></div></div><div class="info-item"><div class="info-icon"><i class="fas fa-envelope"></i></div><div class="info-text"><strong>Email</strong><span>${contentData.contact.email}</span></div></div><div class="info-item"><div class="info-icon"><i class="fas fa-clock"></i></div><div class="info-text"><strong>${lang === 'ar' ? 'ساعات العمل' : 'Hours'}</strong><span>${contentData.contact.hours[lang]}</span></div></div><a href="https://www.openstreetmap.org/?mlat=36.7538&mlon=3.0588#map=13/36.7538/3.0588" target="_blank" class="direction-btn"><i class="fas fa-directions"></i> ${lang === 'ar' ? 'اتجاهات' : 'Directions'}</a></div></div><div class="contact-form-container"><form id="contactForm" action="https://formspree.io/f/xvzdoogy" method="POST"><div class="form-group"><label>${lang === 'ar' ? 'الاسم' : 'Name'}</label><input type="text" name="name" required></div><div class="form-group"><label>Email</label><input type="email" name="email" required></div><div class="form-group"><label>${lang === 'ar' ? 'الهاتف' : 'Phone'}</label><div class="phone-field-row"><div class="phone-prefix">+213</div><input type="tel" name="phone" placeholder="551234567"></div></div><div class="form-group"><label>${lang === 'ar' ? 'الموضوع' : 'Subject'}</label><select name="subject" id="subjectSelect"><option value="general">${lang === 'ar' ? 'عام' : 'General'}</option><option value="web">Web Dev</option><option value="ai">AI</option><option value="drone">Drone</option><option value="languages">Languages</option><option value="academic">Academic</option><option value="online">Online</option><option value="smart">Smart</option></select></div><div class="form-group"><label>${lang === 'ar' ? 'الرسالة' : 'Message'}</label><textarea name="message" rows="5" required></textarea></div><button type="submit" class="submit-btn">${lang === 'ar' ? 'إرسال' : 'Send'}</button></form><div id="formMessage" class="form-message"></div></div>`;
        let form = document.getElementById('contactForm');
        if(form) form.onsubmit = async (e) => { e.preventDefault(); let btn = form.querySelector('.submit-btn'), orig = btn.innerText; btn.disabled = true; btn.innerText = 'Sending...'; try { let res = await fetch(form.action, { method: 'POST', body: new FormData(form), headers: { 'Accept': 'application/json' } }); if(res.ok) { document.getElementById('formMessage').className = 'form-message success'; document.getElementById('formMessage').innerText = '✅ Sent!'; form.reset(); } else throw Error(); } catch(e) { document.getElementById('formMessage').className = 'form-message error'; document.getElementById('formMessage').innerText = '❌ Error'; } btn.disabled = false; btn.innerText = orig; setTimeout(() => { let m = document.getElementById('formMessage'); m.style.display = 'none'; m.className = 'form-message'; }, 5000); };
    }
    
    function showPage(p, e) { if(e) e.preventDefault(); document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active-page')); document.getElementById(p + 'Page').classList.add('active-page'); if(p === 'contact') document.getElementById('contactSection').scrollIntoView({ behavior: 'smooth' }); else window.scrollTo({ top: 0 }); }
    function scrollToContact() { showPage('home', null); setTimeout(() => document.getElementById('contactSection').scrollIntoView({ behavior: 'smooth' }), 100); }
    
    function switchLanguage(lang, btn) { 
        currentLanguage = lang; 
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active')); 
        btn.classList.add('active'); 
        document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr'); 
        document.documentElement.setAttribute('lang', lang); 
        document.getElementById('navHome').innerText = lang === 'ar' ? 'الرئيسية' : 'Home'; 
        document.getElementById('navAbout').innerText = lang === 'ar' ? 'من نحن' : 'About'; 
        document.getElementById('navContact').innerText = lang === 'ar' ? 'اتصل بنا' : 'Contact'; 
        document.getElementById('footerText').innerText = contentData.footer[lang]; 
        document.getElementById('closeModalBtn').innerText = lang === 'ar' ? 'إغلاق' : 'Close';
        document.getElementById('partnersTitle').innerHTML = lang === 'ar' ? '🤝 شركاء النجاح' : '🤝 Our Partners';
        document.getElementById('projectsTitle').innerHTML = lang === 'ar' ? '🏆 من أعمالنا' : '🏆 Our Projects';
        document.getElementById('testimonialsTitle').innerHTML = lang === 'ar' ? '⭐ ماذا يقول عملاؤنا' : '⭐ What Our Clients Say';
        renderHome(); 
        renderAbout(); 
        renderContact(); 
    }
    
    renderHome(); 
    renderAbout(); 
    renderContact();
</script>

</body>
</html>
